<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashflow Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="topbar">
    <h1>ICON FINANCE</h1>
    <div class="topbar-right">
      <div class="date-display" id="todayDate"></div>
      <button id="historyBtn" class="btn btn-secondary">История</button>
    </div>
  </header>

  <div id="historyOverlay" class="modal-overlay hidden">
    <div class="modal modal-lg">
      <div class="modal-head">
        <h2>История транзакций</h2>
        <button id="closeHistory" class="btn-icon" title="Закрыть">✕</button>
      </div>
      <p class="modal-hint">Каждая транзакция — источник, время и дата ввода. Удалённые показаны зачёркнутыми.</p>
      <div class="modal-tabs">
        <button class="modal-tab active" data-history-tab="expense">Расходы</button>
        <button class="modal-tab" data-history-tab="income">Доходы</button>
      </div>
      <div id="historyBody" class="modal-body"></div>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">Поступило</div>
      <div class="kpi-value" id="kpiIn">0</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Потратили сегодня</div>
      <div class="kpi-value" id="kpiOut">0</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Осталось</div>
      <div class="kpi-value" id="kpiLeft">0</div>
    </div>
  </div>

  <div class="methods-row" id="methodsRow">
    <!-- 3 method blocks (Категории / Было-Поступило / Остаток), filled by JS -->
  </div>

  <div class="panel">
    <div class="panel-head">
      <h2>Наименования</h2>
      <div class="panel-head-actions">
        <button id="newMonthBtn" class="btn btn-secondary">Перейти к новому месяцу</button>
        <button id="toggleAddRow" class="btn btn-secondary">+ Добавить</button>
      </div>
    </div>

    <form id="newRowForm" class="inline-form hidden">
      <input type="text" id="newRowPayDate" placeholder="Дата (любая, 5 число...)">
      <input type="text" id="newRowName" placeholder="Название" required>
      <input type="text" inputmode="numeric" id="newRowDue" placeholder="Должны" data-amount required>
      <button type="submit" class="btn btn-primary">Добавить</button>
      <button type="button" id="cancelAddRow" class="btn btn-secondary">Отмена</button>
    </form>

    <table class="data-table expense-table">
      <thead>
        <tr>
          <th class="drag-col"></th>
          <th>Дата</th>
          <th>Наименования</th>
          <th class="num">Должны</th>
          <th class="num">Отдали Сегодня</th>
          <th class="num">Отдали в этом месяце</th>
          <th class="num">Разница</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="expenseTableBody"></tbody>
      <tfoot id="expenseTableFoot"></tfoot>
    </table>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
